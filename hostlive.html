<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wookey — Jadwal Tim Host Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:        #0c0e14;
    --surface:   #13151f;
    --surface2:  #1a1d2a;
    --border:    #252836;
    --text:      #e8eaf2;
    --muted:     #5a6070;
    --shopee:    #EE4D2D;
    --tiktok:    #ff0050;
    --green:     #10b981;
    --accent:    #6366f1;
    --dalu:      #7c3aed;
    --pagi:      #059669;
    --siang:     #d97706;
    --malam:     #2563eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .logo { background: var(--shopee); color: #fff; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
  .header-title { font-size: 15px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn-input {
    font-size: 12px; font-weight: 500; padding: 7px 14px;
    background: var(--accent); color: #fff; border: none; border-radius: 7px;
    cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px;
  }

  /* ── Controls ── */
  .controls {
    padding: 14px 20px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .ctrl-select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-size: 13px;
    padding: 7px 12px; font-family: 'Inter', sans-serif; cursor: pointer;
    outline: none; transition: border .15s;
  }
  .ctrl-select:focus { border-color: var(--accent); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); color: var(--muted);
    background: transparent; transition: all .15s;
  }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .week-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .week-btn {
    width: 28px; height: 28px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .week-btn:hover { border-color: var(--accent); color: var(--accent); }
  .period-label { font-size: 12px; font-weight: 500; color: var(--text); min-width: 160px; text-align: center; }

  /* ── Main ── */
  .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* ── Overview Grid ── */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .host-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; cursor: pointer; transition: all .2s;
  }
  .host-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .host-card.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
  .host-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 10px;
  }
  .host-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .host-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .shift-pills { display: flex; gap: 3px; flex-wrap: wrap; }
  .shift-pill { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; }

  /* ── Week View ── */
  .week-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .back-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .back-btn:hover { border-color: var(--text); color: var(--text); }
  .week-host-info { display: flex; align-items: center; gap: 10px; }
  .week-host-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
  .week-host-name { font-size: 15px; font-weight: 700; }
  .week-host-sub { font-size: 11px; color: var(--muted); }

  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-col { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .day-col.today { border-color: var(--accent); }
  .day-head { padding: 8px; background: var(--surface2); border-bottom: 1px solid var(--border); text-align: center; }
  .day-name { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  .day-num { font-size: 16px; font-weight: 700; }
  .day-col.today .day-num { color: var(--accent); }
  .day-mon { font-size: 9px; color: var(--muted); }
  .day-shifts { padding: 6px; display: flex; flex-direction: column; gap: 4px; min-height: 120px; }
  .shift-block {
    border-radius: 5px; padding: 5px 7px; font-size: 10px;
    border-left: 3px solid transparent;
  }
  .shift-block-name { font-weight: 700; font-size: 9px; opacity: .8; margin-bottom: 1px; }
  .shift-block-host { font-weight: 600; font-size: 11px; }
  .shift-block-akun { font-size: 9px; opacity: .65; }
  .day-empty { text-align: center; color: var(--muted); font-size: 11px; padding: 16px 0; }

  /* ── Month View ── */
  .month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .month-head-cell {
    padding: 8px; text-align: center; background: var(--surface2);
    border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 600; color: var(--muted);
  }
  .month-day {
    min-height: 90px; padding: 5px; background: var(--surface);
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .month-day:nth-child(7n) { border-right: none; }
  .month-day.dim { opacity: .3; background: var(--bg); }
  .month-day.today-day { background: color-mix(in srgb, var(--accent) 5%, var(--surface)); }
  .month-date { font-size: 11px; font-weight: 600; margin-bottom: 3px; }
  .month-day.today-day .month-date { color: var(--accent); }
  .month-tag {
    font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px;
    margin-bottom: 2px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── All Hosts Day View ── */
  .allhosts-grid { display: flex; flex-direction: column; gap: 8px; }
  .allhosts-day {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .allhosts-day-head {
    padding: 8px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
  }
  .allhosts-day-date { font-size: 11px; color: var(--muted); }
  .allhosts-shifts { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; padding: 8px; }
  .allhosts-shift {
    border-radius: 6px; padding: 7px 10px; border-left: 3px solid transparent;
  }
  .allhosts-shift-label { font-size: 9px; font-weight: 700; opacity: .7; margin-bottom: 2px; }
  .allhosts-shift-host { font-size: 12px; font-weight: 600; }
  .allhosts-shift-akun { font-size: 10px; opacity: .6; }

  /* ── Shift Colors ── */
  .sc-dalu  { background: color-mix(in srgb,#7c3aed 18%,transparent); border-color: #7c3aed; color: #c4b5fd; }
  .sc-pagi  { background: color-mix(in srgb,#059669 18%,transparent); border-color: #059669; color: #6ee7b7; }
  .sc-siang { background: color-mix(in srgb,#d97706 18%,transparent); border-color: #d97706; color: #fde68a; }
  .sc-malam { background: color-mix(in srgb,#2563eb 18%,transparent); border-color: #2563eb; color: #93c5fd; }

  /* ── Loading / Empty ── */
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; }
  .empty { text-align: center; padding: 40px; color: var(--muted); }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .empty-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }

  @media (max-width: 768px) {
    .week-grid { grid-template-columns: repeat(3, 1fr); }
    .overview-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-brand">
    <span class="logo">WW</span>
    <div>
      <div class="header-title">Tim Host Live</div>
      <div class="header-sub">Wookey Weight Official</div>
    </div>
  </div>
  <div class="header-right">
    <a href="jadwal-host.html" class="btn-input">✏️ Input Jadwal</a>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <select class="ctrl-select" id="hostSelect" onchange="onHostChange(this.value)" style="min-width:150px;">
    <option value="">Semua Host</option>
  </select>
  <select class="ctrl-select" id="platformFilter" onchange="applyFilters()" style="min-width:110px;">
    <option value="">Semua Platform</option>
    <option value="Shopee">Shopee</option>
    <option value="TikTok">TikTok</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="btnWeek"  onclick="setView('week')">Mingguan</button>
    <button class="view-btn"        id="btnMonth" onclick="setView('month')">Bulanan</button>
    <button class="view-btn"        id="btnAll"   onclick="setView('all')">Semua</button>
  </div>
  <div class="week-nav">
    <button class="week-btn" onclick="changeOffset(-1)">‹</button>
    <div class="period-label" id="periodLabel">–</div>
    <button class="week-btn" onclick="changeOffset(1)">›</button>
  </div>
</div>

<!-- Main -->
<div class="main" id="mainContent">
  <div class="loading">⏳ Memuat data jadwal...</div>
</div>

<script>
const APPS_URL   = 'https://script.google.com/macros/s/AKfycbxfqb75rY1XyfrUdYRr6Ne-ScyO1dQ6fMR3dGhARbL2i27UKKofGl02OqiDHGzrV1SQ/exec';
const SHEET_ID   = '1AuIXCWDzaTdSclKA64qJHgllySc-uuW2ewTrfdnDgF8';
const HARI       = ['MIN','SEN','SEL','RAB','KAM','JUM','SAB'];
const BULAN      = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const SHIFTS     = ['Dalu','Pagi','Siang','Malam'];
const COLORS     = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#f97316','#14b8a6','#a855f7'];
const SC         = { Dalu:'sc-dalu', Pagi:'sc-pagi', Siang:'sc-siang', Malam:'sc-malam' };

let jadwal   = [];
let hosts    = [];
let selHost  = '';
let view     = 'week';
let offset   = 0;

function fmtISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function parseDate(v) {
  if (!v) return null;
  if (typeof v === 'string' && v.startsWith('Date(')) {
    const p = v.replace('Date(','').replace(')','').split(',');
    const d = new Date(+p[0], +p[1], +p[2]);
    return fmtISO(d);
  }
  if (typeof v === 'number') {
    const d = new Date(Date.UTC(1899,11,30) + v*86400000);
    return fmtISO(d);
  }
  return v;
}

function getWeekDates() {
  const t = new Date(), day = t.getDay();
  const mon = new Date(t); mon.setDate(t.getDate() - (day===0?6:day-1) + offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function getMonthDates() {
  const t = new Date();
  const y = t.getFullYear() + Math.floor((t.getMonth()+offset)/12);
  const m = ((t.getMonth()+offset)%12+12)%12;
  const last = new Date(y,m+1,0).getDate();
  return Array.from({length:last},(_,i)=>new Date(y,m,i+1));
}

function updatePeriodLabel() {
  const el = document.getElementById('periodLabel');
  if (view==='week') {
    const d = getWeekDates();
    el.textContent = `${d[0].getDate()} ${BULAN[d[0].getMonth()].slice(0,3)} – ${d[6].getDate()} ${BULAN[d[6].getMonth()].slice(0,3)} ${d[6].getFullYear()}`;
  } else if (view==='month') {
    const t=new Date(), m=((t.getMonth()+offset)%12+12)%12, y=t.getFullYear()+Math.floor((t.getMonth()+offset)/12);
    el.textContent = `${BULAN[m]} ${y}`;
  } else {
    el.textContent = 'Semua Jadwal';
  }
}

function getFilteredJadwal() {
  const plat = document.getElementById('platformFilter').value;
  return jadwal.filter(j => (!selHost || j.host===selHost) && (!plat || j.platform===plat));
}

function render() {
  updatePeriodLabel();
  const data = getFilteredJadwal();
  const el   = document.getElementById('mainContent');

  if (!selHost && view!=='all') { renderOverview(el, data); return; }
  if (view==='week')  renderWeek(el, data);
  else if (view==='month') renderMonth(el, data);
  else renderAll(el, data);
}

// ── OVERVIEW ─────────────────────────────────────────────────
function renderOverview(el, data) {
  const dates = view==='week' ? getWeekDates() : getMonthDates();
  const dateSet = new Set(dates.map(fmtISO));
  const plat = document.getElementById('platformFilter').value;

  const stats = {};
  jadwal.filter(j=>(!plat||j.platform===plat)&&dateSet.has(j.tanggal)).forEach(j=>{
    if (!stats[j.host]) stats[j.host] = {shifts:{},count:0};
    stats[j.host].shifts[j.shift] = (stats[j.host].shifts[j.shift]||0)+1;
    stats[j.host].count++;
  });

  if (!Object.keys(stats).length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Belum ada jadwal untuk periode ini</div></div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'overview-grid';
  Object.entries(stats).sort((a,b)=>b[1].count-a[1].count).forEach(([nama,stat],i)=>{
    const hi   = hosts.find(h=>h.nama===nama);
    const col  = COLORS[i%COLORS.length];
    const init = nama.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const pills= Object.entries(stat.shifts).map(([s,c])=>`<span class="shift-pill ${SC[s]}">${s} ×${c}</span>`).join('');
    const card = document.createElement('div');
    card.className='host-card';
    card.onclick  =()=>{ selHost=nama; document.getElementById('hostSelect').value=nama; render(); };
    card.innerHTML=`<div class="host-avatar" style="background:${col}">${init}</div>
      <div class="host-name">${nama}</div>
      <div class="host-meta">${hi?.leader?'Leader: '+hi.leader:''}</div>
      <div class="shift-pills">${pills}</div>`;
    grid.appendChild(card);
  });
  el.innerHTML=''; el.appendChild(grid);
}

// ── WEEK VIEW ─────────────────────────────────────────────────
function renderWeek(el, data) {
  const dates   = getWeekDates();
  const today   = fmtISO(new Date());
  const map     = {};
  data.forEach(j=>{ const k=`${j.tanggal}|${j.shift}`; if(!map[k])map[k]=[]; map[k].push(j); });

  const hostIdx = hosts.findIndex(h=>h.nama===selHost);
  const col     = COLORS[hostIdx>=0?hostIdx%COLORS.length:0];
  const init    = selHost.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const hi      = hosts.find(h=>h.nama===selHost);

  el.innerHTML='';
  if (selHost) {
    const hdr = document.createElement('div');
    hdr.className='week-header';
    hdr.innerHTML=`<button class="back-btn" onclick="selHost='';document.getElementById('hostSelect').value='';render()">← Semua</button>
      <div class="week-host-info">
        <div class="week-host-avatar" style="background:${col}">${init}</div>
        <div><div class="week-host-name">${selHost}</div><div class="week-host-sub">${hi?.leader?'Leader: '+hi.leader:''} ${hi?.status?'· '+hi.status:''}</div></div>
      </div>`;
    el.appendChild(hdr);
  }

  const grid = document.createElement('div');
  grid.className='week-grid';
  dates.forEach(d=>{
    const iso = fmtISO(d);
    const col = document.createElement('div');
    col.className=`day-col${iso===today?' today':''}`;
    col.innerHTML=`<div class="day-head"><div class="day-name">${HARI[d.getDay()]}</div><div class="day-num">${d.getDate()}</div><div class="day-mon">${BULAN[d.getMonth()].slice(0,3)}</div></div>`;
    const shifts = document.createElement('div');
    shifts.className='day-shifts';
    let has=false;
    SHIFTS.forEach(s=>{
      const items=(map[`${iso}|${s}`]||[]);
      items.forEach(item=>{
        has=true;
        const b=document.createElement('div');
        b.className=`shift-block ${SC[s]}`;
        b.innerHTML=`<div class="shift-block-name">${s}</div><div class="shift-block-host">${item.host}</div><div class="shift-block-akun">${item.platform} · ${item.akun}</div>${item.bersama?`<div class="shift-block-akun">+${item.bersama}</div>`:''}`;
        shifts.appendChild(b);
      });
    });
    if(!has) shifts.innerHTML='<div class="day-empty">–</div>';
    col.appendChild(shifts);
    grid.appendChild(col);
  });
  el.appendChild(grid);
}

// ── MONTH VIEW ────────────────────────────────────────────────
function renderMonth(el, data) {
  const t   = new Date();
  const y   = t.getFullYear()+Math.floor((t.getMonth()+offset)/12);
  const m   = ((t.getMonth()+offset)%12+12)%12;
  const today=fmtISO(t);
  const map = {};
  data.forEach(j=>{ if(!map[j.tanggal])map[j.tanggal]=[]; map[j.tanggal].push(j); });

  const hostIdx=hosts.findIndex(h=>h.nama===selHost);
  const col=COLORS[hostIdx>=0?hostIdx%COLORS.length:0];
  const init=selHost.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const hi=hosts.find(h=>h.nama===selHost);

  el.innerHTML='';
  if(selHost){
    const hdr=document.createElement('div'); hdr.className='week-header';
    hdr.innerHTML=`<button class="back-btn" onclick="selHost='';document.getElementById('hostSelect').value='';render()">← Semua</button>
      <div class="week-host-info"><div class="week-host-avatar" style="background:${col}">${init}</div>
      <div><div class="week-host-name">${selHost}</div><div class="week-host-sub">${hi?.leader?'Leader: '+hi.leader:''}</div></div></div>`;
    el.appendChild(hdr);
  }

  const grid=document.createElement('div'); grid.className='month-grid';
  HARI.forEach(h=>{const th=document.createElement('div');th.className='month-head-cell';th.textContent=h;grid.appendChild(th);});

  const first=new Date(y,m,1).getDay();
  for(let i=0;i<first;i++){const d=document.createElement('div');d.className='month-day dim';grid.appendChild(d);}

  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items=map[iso]||[];
    const cell=document.createElement('div');
    cell.className=`month-day${iso===today?' today-day':''}`;
    cell.innerHTML=`<div class="month-date">${d}</div>`;
    items.slice(0,4).forEach(item=>{
      const tag=document.createElement('span');
      tag.className=`month-tag ${SC[item.shift]}`;
      tag.textContent=`${item.shift} · ${item.host.split(' ')[0]}`;
      cell.appendChild(tag);
    });
    if(items.length>4){const m=document.createElement('span');m.style.cssText='font-size:9px;color:var(--muted);';m.textContent=`+${items.length-4}`;cell.appendChild(m);}
    grid.appendChild(cell);
  }
  el.appendChild(grid);
}

// ── ALL VIEW ──────────────────────────────────────────────────
function renderAll(el, data) {
  const map={};
  data.forEach(j=>{ if(!map[j.tanggal])map[j.tanggal]={}; if(!map[j.tanggal][j.shift])map[j.tanggal][j.shift]=[]; map[j.tanggal][j.shift].push(j); });
  const dates=Object.keys(map).sort().reverse();
  if(!dates.length){el.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Belum ada jadwal</div></div>';return;}
  el.innerHTML='';
  const wrap=document.createElement('div');wrap.className='allhosts-grid';
  dates.slice(0,30).forEach(tgl=>{
    const d=new Date(tgl+'T00:00:00');
    const day=document.createElement('div');day.className='allhosts-day';
    day.innerHTML=`<div class="allhosts-day-head"><span>${HARI[d.getDay()]}</span><span class="allhosts-day-date">${d.getDate()} ${BULAN[d.getMonth()]} ${d.getFullYear()}</span></div>`;
    const shifts=document.createElement('div');shifts.className='allhosts-shifts';
    SHIFTS.forEach(s=>{
      (map[tgl][s]||[]).forEach(item=>{
        const b=document.createElement('div');b.className=`allhosts-shift ${SC[s]}`;
        b.innerHTML=`<div class="allhosts-shift-label">${s} · ${item.platform}</div><div class="allhosts-shift-host">${item.host}</div><div class="allhosts-shift-akun">${item.akun}${item.bersama?' · +'+item.bersama:''}</div>`;
        shifts.appendChild(b);
      });
    });
    day.appendChild(shifts);
    wrap.appendChild(day);
  });
  el.appendChild(wrap);
}

// ── CONTROLS ──────────────────────────────────────────────────
function onHostChange(v) { selHost=v; render(); }
function applyFilters() { render(); }
function setView(v) {
  view=v; offset=0;
  ['week','month','all'].forEach(n=>document.getElementById('btn'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',n===v));
  render();
}
function changeOffset(d) { offset+=d; render(); }

// ── LOAD ──────────────────────────────────────────────────────
async function loadData() {
  try {
    const rh=await fetch(APPS_URL);
    const jh=await rh.json();
    hosts=(jh.hosts||[]).filter(h=>h.status!=='Resign');
    const sel=document.getElementById('hostSelect');
    hosts.forEach(h=>{const o=document.createElement('option');o.value=h.nama;o.textContent=h.nama;sel.appendChild(o);});

    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Formasi%20Jadwal%20Hostlive&headers=1&_cb=${Date.now()}`;
    const rt=await fetch(url); const txt=await rt.text();
    const jt=JSON.parse(txt.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
    jadwal=(jt.table?.rows||[]).map(r=>({
      tanggal: parseDate(r.c?.[0]?.v),
      platform:r.c?.[1]?.v||'',
      akun:    r.c?.[2]?.v||'',
      shift:   r.c?.[3]?.v||'',
      host:    r.c?.[4]?.v||'',
      bersama: r.c?.[5]?.v||'',
    })).filter(r=>r.tanggal&&r.host);

    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Gagal memuat data</div></div>`;
  }
}

loadData();
</script>
