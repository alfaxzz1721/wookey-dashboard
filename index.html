<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wookey Weight — Dashboard Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0c0e14;
    --surface:   #13151f;
    --surface2:  #1a1d2a;
    --border:    #252836;
    --text:      #e8eaf2;
    --muted:     #5a6070;
    --shopee:    #EE4D2D;
    --green:     #10b981;
    --red:       #ef4444;

    --c-gmv:      #f59e0b;
    --c-order:    #10b981;
    --c-click:    #3b82f6;
    --c-watch:    #8b5cf6;
    --c-show:     #64748b;
    --c-ctr:      #ec4899;
    --c-ctor:     #06b6d4;
    --c-aov:      #f97316;
    --c-err:      #e879f9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* ── Layout ── */
  .app-layout { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 200;
    overflow-y: auto;
  }
  .sidebar-brand {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-brand .logo { font-size: 10px; padding: 4px 10px; }
  .sidebar-brand-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .sidebar-brand-sub { font-size: 10px; color: var(--muted); }

  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 4px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    transition: all .15s;
    margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: color-mix(in srgb, var(--shopee) 15%, transparent); color: var(--text); }
  .sidebar-item.active .sidebar-icon { color: var(--shopee); }
  .sidebar-icon { font-size: 15px; width: 18px; text-align: center; }
  .sidebar-badge {
    margin-left: auto;
    background: var(--shopee);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* ── Content Area ── */
  .content-area {
    margin-left: 220px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    background: var(--shopee);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
  }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-left: auto; }

  .main { padding: 24px 28px; max-width: 1400px; }

  /* KPI */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .kpi-label { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .kpi-value { font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-bottom: 3px; }
  .kpi-delta { font-size: 9px; color: var(--muted); }
  .kpi-delta.up { color: var(--green); }
  .kpi-full {
    font-size: 9px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 2px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: all .2s;
  }
  .kpi:hover .kpi-full {
    opacity: 1;
    max-height: 20px;
  }
  .kpi-delta.down { color: var(--red); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .toolbar-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-right: 2px; white-space: nowrap; }
  .toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
  }
  .toggle.active {
    border-color: var(--accent);
    color: var(--text);
    background: color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .toggle .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* Date filter */
  .date-filter { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .date-filter input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 5px 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .date-filter span { color: var(--muted); font-size: 12px; }

  /* Chart */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
  .chart-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 320px; }

  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); gap: 12px; font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--shopee); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: #2d1515; border: 1px solid #5c2020; border-radius: 8px; padding: 16px; color: #f87171; font-size: 13px; margin-bottom: 16px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .content-area { margin-left: 0; }
    .main { padding: 16px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->

      <div>
        <div class="sidebar-brand-name">Wookey Weight</div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Analytics</div>

      <a class="sidebar-item" href="#" style="opacity:.5;pointer-events:none;">

    <div style="margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);">

  <!-- Content -->
  <div class="content-area">
    <div class="header">
      <span class="header-title">Overview</span>

  <div class="kpi-grid" id="kpi-grid">

  <div class="toolbar">

    <div id="filter-day" style="display:flex;align-items:center;gap:8px;">

<script>
const SHEET_ID   = '1l8xk-SOZdmYQvHabXisCrVNCh8lcfQ-yHYnhiXE0KME';
const SHEET_NAME = 'Shopee Stats Harian';
const API_URL    = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

const METRICS = {
  'Live Show PV':  { color: '#64748b', format: 'number', axis: 'y2' },
  'Live Watch PV': { color: '#8b5cf6', format: 'number', axis: 'y2' },
  'Click Product': { color: '#3b82f6', format: 'number', axis: 'y2' },
  'Order Number':  { color: '#10b981', format: 'number', axis: 'y2' },
  'GMV':           { color: '#f59e0b', format: 'rp',     axis: 'y1' },
  'ERR':           { color: '#e879f9', format: 'pct',    axis: 'y3' },
  'CTOR':          { color: '#06b6d4', format: 'pct',    axis: 'y3' },
  'CTR':           { color: '#ec4899', format: 'pct',    axis: 'y3' },
  'AOV':           { color: '#f97316', format: 'rp',     axis: 'y1' },
  'ARPU':          { color: '#34d399', format: 'rp',     axis: 'y1' },
};

const KPI_LIST = [
  { key: 'Live Show PV',  label: 'Live Show PV',  accent: '#64748b' },
  { key: 'Live Watch PV', label: 'Live Watch PV', accent: '#8b5cf6' },
  { key: 'Click Product', label: 'Click Product', accent: '#3b82f6' },
  { key: 'Order Number',  label: 'Order Number',  accent: '#10b981' },
  { key: 'GMV',           label: 'GMV',           accent: '#f59e0b' },
  { key: 'ERR',           label: 'ERR',           accent: '#e879f9' },
  { key: 'CTR',           label: 'CTR',           accent: '#ec4899' },
  { key: 'CTOR',          label: 'CTOR',          accent: '#06b6d4' },
  { key: 'AOV',           label: 'AOV',           accent: '#f97316' },
  { key: 'ARPU',          label: 'ARPU',          accent: '#34d399' },
];

function fmtRp(v) {
  if (v >= 1e9) return 'Rp ' + (v/1e9).toFixed(1) + 'M';
  if (v >= 1e6) return 'Rp ' + (v/1e6).toFixed(1) + 'jt';
  return 'Rp ' + Math.round(v).toLocaleString('id-ID');
}
function fmtNum(v) {
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return Math.round(v).toLocaleString('id-ID');
}
function fmtPct(v) { return (v * 100).toFixed(2) + '%'; }
function fmt(v, type) {
  if (type === 'rp') return fmtRp(v);
  if (type === 'pct') return fmtPct(v);
  return fmtNum(v);
}

async function fetchData() {
  const res  = await fetch(API_URL);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, '$1'));
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(row => {
    const obj = {};
    cols.forEach((col, i) => { const cell = row.c[i]; obj[col] = cell ? cell.v : 0; });
    // Hitung ERR = Live Watch PV / Live Show PV
    const showPV  = obj['Live Show PV'] || 0;
    const watchPV = obj['Live Watch PV'] || 0;
    obj['ERR'] = showPV > 0 ? watchPV / showPV : 0;
    return obj;
  }).filter(r => r['Tanggal']);
}

function calcKPI(data) {
  // SUM untuk metrik volume
  const totalShowPV  = data.reduce((s, d) => s + (d['Live Show PV']  || 0), 0);
  const totalWatchPV = data.reduce((s, d) => s + (d['Live Watch PV'] || 0), 0);
  const totalClick   = data.reduce((s, d) => s + (d['Click Product'] || 0), 0);
  const totalOrder   = data.reduce((s, d) => s + (d['Order Number']  || 0), 0);
  const totalGMV     = data.reduce((s, d) => s + (d['GMV']           || 0), 0);

  // Kalkulasi rasio dari total
  const err  = totalShowPV  > 0 ? totalWatchPV / totalShowPV  : 0;
  const ctor = totalClick   > 0 ? totalOrder   / totalClick   : 0;
  const ctr  = totalWatchPV > 0 ? totalClick   / totalWatchPV : 0; // CTR = Click Product / Live Watch PV
  const aov  = totalOrder   > 0 ? totalGMV     / totalOrder   : 0;
  const totalPembeli = data.reduce((s, d) => s + (Number(d['Pembeli']) || 0), 0);
  const arpu = totalPembeli > 0 ? totalGMV / totalPembeli : 0;

  return {
    'Live Show PV':  totalShowPV,
    'Live Watch PV': totalWatchPV,
    'Click Product': totalClick,
    'Order Number':  totalOrder,
    'GMV':           totalGMV,
    'ERR':           err,
    'CTOR':          ctor,
    'CTR':           ctr,
    'AOV':           aov,
    'ARPU':          arpu,
  };
}

function renderKPI(data) {
  const kpi = calcKPI(data);
  const days = data.length;
  document.getElementById('kpi-grid').innerHTML = KPI_LIST.map(k => {
    const val  = kpi[k.key] || 0;
    const type = METRICS[k.key]?.format || 'number';
    const isRatio = ['ERR','CTOR','CTR','AOV','ARPU'].includes(k.key);
    const sublabel = isRatio
      ? `<div class="kpi-delta">Kalkulasi ${days} hari</div>`
      : `<div class="kpi-delta">Total ${days} hari</div>`;
    const isVolume = ['Live Show PV','Live Watch PV','Click Product','Order Number'].includes(k.key);
    const isMoney  = ['GMV'].includes(k.key);
    const isARPU   = k.key === 'ARPU';
    // Traffic metrics: show full number, no abbreviation
    const displayVal = isVolume
      ? Math.round(val).toLocaleString('id-ID')
      : isARPU
        ? 'Rp ' + Math.round(val).toLocaleString('id-ID')
        : fmt(val, type);
    // Money metrics: show abbreviated + full number on hover
    const fullVal = isMoney
      ? `title="Detail: Rp ${Math.round(val).toLocaleString('id-ID')}"`
      : '';
    const tooltip = isMoney
      ? `<div class="kpi-full">Rp ${Math.round(val).toLocaleString('id-ID')}</div>`
      : '';
    return `<div class="kpi" style="--accent:${k.accent}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" ${fullVal}>${displayVal}</div>
      ${tooltip}
      ${sublabel}
    </div>`;
  }).join('');
}

let chartInstance = null;
function getActive() {
  return [...document.querySelectorAll('.toggle.active[data-metric]')].map(b => b.dataset.metric);
}

function renderChart(data) {
  data = groupData(data, currentGroup);
  const labels  = data.map(d => d['Tanggal']);
  const active  = getActive();
  const datasets = active.map(key => {
    const m = METRICS[key];
    return {
      label: key,
      data: data.map(d => d[key] || 0),
      borderColor: m.color,
      backgroundColor: m.color + '18',
      pointBackgroundColor: m.color,
      pointRadius: 4,
      pointHoverRadius: 7,
      tension: 0.3,
      yAxisID: m.axis,
      fill: false,
    };
  });

  const hasY1 = active.some(k => METRICS[k]?.axis === 'y1');
  const hasY2 = active.some(k => METRICS[k]?.axis === 'y2');
  const hasY3 = active.some(k => METRICS[k]?.axis === 'y3');

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('mainChart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#e8eaf2', font: { size: 12 }, boxWidth: 12 } },
        tooltip: {
          backgroundColor: '#13151f', borderColor: '#252836', borderWidth: 1,
          titleColor: '#e8eaf2', bodyColor: '#9ca3af', padding: 12,
          callbacks: {
            label: ctx => {
              const type = METRICS[ctx.dataset.label]?.format || 'number';
              return ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y, type)}`;
            }
          }
        }
      },
      scales: {
        x: { 
          ticks: { color: '#5a6070', font: { size: 11, family: 'JetBrains Mono' } }, 
          grid: { color: '#252836' },
          offset: true,
        },
        y1: { display: hasY1, position: 'left', ticks: { color: '#f59e0b', font: { size: 10 }, callback: v => fmtRp(v) }, grid: { color: '#252836' } },
        y2: { display: hasY2, position: hasY1 ? 'right' : 'left', ticks: { color: '#10b981', font: { size: 10 }, callback: v => fmtNum(v) }, grid: { display: !hasY1, color: '#252836' } },
        y3: { display: hasY3, position: 'right', ticks: { color: '#e879f9', font: { size: 10 }, callback: v => fmtPct(v) }, grid: { display: false } },
      }
    }
  });
}

let globalData = [];
let filteredData = [];
let currentGroup = 'day';

document.querySelectorAll('.toggle[data-metric]').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    if (filteredData.length) renderChart(filteredData);
  });
});

// ── Group By ──────────────────────────────────────────────────────────────────
function setGroup(group) {
  currentGroup = group;
  document.querySelectorAll('[data-group]').forEach(b => {
    b.classList.toggle('active', b.dataset.group === group);
  });

  // Tampilkan filter yang sesuai
  document.getElementById('filter-day').style.display    = group === 'day'    ? 'flex' : 'none';
  document.getElementById('filter-week').style.display   = group === 'week'   ? 'flex' : 'none';
  document.getElementById('filter-month').style.display  = group === 'month'  ? 'flex' : 'none';
  document.getElementById('filter-custom').style.display = group === 'custom' ? 'flex' : 'none';

  const titles = { day: 'Tren Harian', week: 'Tren Mingguan', month: 'Tren Bulanan', custom: 'Tren Custom' };
  document.getElementById('chart-title').textContent = titles[group];

  // Reset ke semua data
  filteredData = [...globalData];
  renderKPI(filteredData);
  renderChart(filteredData);
  updateDateRange(filteredData);
}

// ── Filter Per Hari ──────────────────────────────────────────────────────────
function applyFilterDay() {
  const date = document.getElementById('date-single').value;
  if (!date) return;

  filteredData = globalData.filter(d => d['Tanggal'] === date);
  if (!filteredData.length) {
    document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data untuk tanggal ini.</div>';
    return;
  }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData);
  renderChart(filteredData);
  document.getElementById('date-range').textContent = date + ' · 1 hari';
}

// ── Filter Per Minggu ────────────────────────────────────────────────────────
function buildWeekOptions() {
  const select = document.getElementById('week-select');
  select.innerHTML = '';
  const weeks = {};

  globalData.forEach(d => {
    const date = new Date(d['Tanggal']);
    // Cari Senin dari minggu ini
    const day = date.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    const monday = new Date(date);
    monday.setDate(date.getDate() + diff);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    const key = monday.toISOString().split('T')[0];
    if (!weeks[key]) {
      const fmtDate = d => d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
      weeks[key] = `${fmtDate(monday)} – ${fmtDate(sunday)}`;
    }
  });

  Object.entries(weeks).sort().forEach(([key, label]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = label;
    select.appendChild(opt);
  });

  // Default ke minggu terakhir
  if (select.options.length) select.selectedIndex = select.options.length - 1;
}

function applyFilterWeek() {
  const monday = document.getElementById('week-select').value;
  if (!monday) return;

  const mondayDate = new Date(monday);
  const sundayDate = new Date(mondayDate);
  sundayDate.setDate(mondayDate.getDate() + 6);
  const sundayStr = sundayDate.toISOString().split('T')[0];

  filteredData = globalData.filter(d => d['Tanggal'] >= monday && d['Tanggal'] <= sundayStr);
  if (!filteredData.length) {
    document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data untuk minggu ini.</div>';
    return;
  }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData);
  renderChart(filteredData);
  updateDateRange(filteredData);
}

// ── Filter Per Bulan ─────────────────────────────────────────────────────────
function buildMonthOptions() {
  const BULAN = ['Januari','Februari','Maret','April','Mei','Juni',
                 'Juli','Agustus','September','Oktober','November','Desember'];
  const months = {};

  globalData.forEach(d => {
    const date = new Date(d['Tanggal']);
    const key  = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    if (!months[key]) months[key] = `${BULAN[date.getMonth()]} ${date.getFullYear()}`;
  });

  const entries = Object.entries(months).sort();

  ['month-from', 'month-to'].forEach(id => {
    const select = document.getElementById(id);
    select.innerHTML = '';
    entries.forEach(([key, label]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = label;
      select.appendChild(opt);
    });
  });

  // Default: from = bulan pertama, to = bulan terakhir
  const fromSel = document.getElementById('month-from');
  const toSel   = document.getElementById('month-to');
  if (fromSel.options.length) fromSel.selectedIndex = 0;
  if (toSel.options.length)   toSel.selectedIndex   = toSel.options.length - 1;
}

function applyFilterMonth() {
  const from = document.getElementById('month-from').value;
  const to   = document.getElementById('month-to').value;
  if (!from || !to) return;

  // Dari awal bulan "from" sampai akhir bulan "to"
  const fromDate = from + '-01';
  const toDateObj = new Date(to + '-01');
  toDateObj.setMonth(toDateObj.getMonth() + 1);
  toDateObj.setDate(toDateObj.getDate() - 1);
  const toDate = toDateObj.toISOString().split('T')[0];

  filteredData = globalData.filter(d => d['Tanggal'] >= fromDate && d['Tanggal'] <= toDate);
  if (!filteredData.length) {
    document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data untuk periode ini.</div>';
    return;
  }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData);
  renderChart(filteredData);
  updateDateRange(filteredData);
}

// ── Filter Custom ─────────────────────────────────────────────────────────────
function applyFilterCustom() {
  const from = document.getElementById('custom-from').value;
  const to   = document.getElementById('custom-to').value;
  if (!from || !to) return;

  filteredData = globalData.filter(d => d['Tanggal'] >= from && d['Tanggal'] <= to);
  if (!filteredData.length) {
    document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data untuk periode ini.</div>';
    return;
  }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData);
  renderChart(filteredData);
  updateDateRange(filteredData);
}

// ── Reset & Utils ────────────────────────────────────────────────────────────
function resetFilter() {
  filteredData = [...globalData];
  renderKPI(filteredData);
  renderChart(filteredData);
  updateDateRange(filteredData);

  const dates = globalData.map(d => d['Tanggal']).sort();
  document.getElementById('date-single').value = dates[dates.length - 1] || '';
  document.getElementById('custom-from').value = dates[0] || '';
  document.getElementById('custom-to').value   = dates[dates.length - 1] || '';
}

function updateDateRange(data) {
  const dates = data.map(d => d['Tanggal']).sort();
  if (!dates.length) return;
  if (dates.length === 1) {
    document.getElementById('date-range').textContent = dates[0] + ' · 1 hari';
  } else {
    document.getElementById('date-range').textContent = `${dates[0]} — ${dates[dates.length-1]} · ${dates.length} hari`;
  }
}

function groupData(data, group) {
  if (group === 'day' || group === 'custom') return data;

  const grouped = {};
  data.forEach(d => {
    let key;
    const date = new Date(d['Tanggal']);
    if (group === 'week') {
      // Minggu ke berapa (ISO week)
      const startOfYear = new Date(date.getFullYear(), 0, 1);
      const week = Math.ceil(((date - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
      key = `${date.getFullYear()}-W${String(week).padStart(2,'0')}`;
    } else if (group === 'month') {
      key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    }

    if (!grouped[key]) {
      grouped[key] = {
        'Tanggal': key,
        'Live Show PV': 0, 'Live Watch PV': 0,
        'Click Product': 0, 'Order Number': 0, 'GMV': 0,
      };
    }
    ['Live Show PV','Live Watch PV','Click Product','Order Number','GMV'].forEach(k => {
      grouped[key][k] = (grouped[key][k] || 0) + (d[k] || 0);
    });
  });

  // Hitung rasio dari total
  return Object.values(grouped).map(g => {
    g['ERR']  = g['Live Show PV']  > 0 ? g['Live Watch PV'] / g['Live Show PV']  : 0;
    g['CTR']  = g['Live Watch PV'] > 0 ? g['Click Product'] / g['Live Watch PV'] : 0;
    g['CTOR'] = g['Click Product'] > 0 ? g['Order Number']  / g['Click Product'] : 0;
    g['AOV']  = g['Order Number']  > 0 ? g['GMV']           / g['Order Number']  : 0;
    return g;
  });
}

async function init() {
  try {
    globalData = await fetchData();
    if (!globalData.length) {
      document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data.</div>';
      return;
    }
    filteredData = [...globalData];
    renderKPI(filteredData);
    renderChart(filteredData);
    const dates = globalData.map(d => d['Tanggal']).sort();
    document.getElementById('date-single').value = dates[dates.length - 1] || '';
    document.getElementById('custom-from').value = dates[0] || '';
    document.getElementById('custom-to').value   = dates[dates.length - 1] || '';
    buildWeekOptions();
    buildMonthOptions();
    updateDateRange(filteredData);
  } catch(err) {
    document.getElementById('error-container').innerHTML = `<div class="error">❌ Gagal memuat data: ${err.message}</div>`;
    console.error(err);
  }
}

init();
</script>
