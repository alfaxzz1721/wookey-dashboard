<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wookey Weight — Dashboard Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0c0e14;
    --surface:   #13151f;
    --surface2:  #1a1d2a;
    --border:    #252836;
    --text:      #e8eaf2;
    --muted:     #5a6070;
    --shopee:    #EE4D2D;
    --tiktok:    #ff0050;
    --green:     #10b981;
    --red:       #ef4444;

    --c-gmv:      #f59e0b;
    --c-order:    #10b981;
    --c-click:    #3b82f6;
    --c-watch:    #8b5cf6;
    --c-show:     #64748b;
    --c-ctr:      #ec4899;
    --c-ctor:     #06b6d4;
    --c-aov:      #f97316;
    --c-err:      #e879f9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  .app-layout { display: flex; min-height: 100vh; }

  /* Sidebar */
  /* ── Sidebar Toggle ────────────────────────────── */
  .sidebar {
    width: 220px; min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0;
    height: 100vh; z-index: 200; overflow-y: auto;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.collapsed { transform: translateX(-220px); }
  .sidebar-close {
    position: absolute; top: 14px; right: 10px;
    width: 28px; height: 28px;
    background: transparent; border: none;
    border-radius: 6px; cursor: pointer;
    color: var(--muted); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .sidebar-close:hover { background: var(--surface2); color: var(--text); }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 199;
  }
  .sidebar-overlay.show { display: block; }
  .content-area {
    margin-left: 220px;
    width: calc(100% - 220px);
    flex: 1; display: flex; flex-direction: column; min-height: 100vh;
    transition: margin-left .25s cubic-bezier(.4,0,.2,1),
                width .25s cubic-bezier(.4,0,.2,1);
  }
  .content-area.expanded { margin-left: 0; width: 100%; }
  .sidebar-toggle {
    position: fixed; top: 14px; left: 16px;
    z-index: 300;
    width: 32px; height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    color: var(--muted);
    transition: all .15s;
    flex-direction: column; gap: 4px; padding: 8px;
  }
  .sidebar-toggle:hover { background: var(--surface); color: var(--text); }
  .sidebar-toggle .bar {
    width: 14px; height: 1.5px;
    background: currentColor; border-radius: 2px;
    transition: all .25s;
  }
  /* Tombol tutup di dalam sidebar */
  .sidebar-close {
    position: absolute; top: 14px; right: 10px;
    width: 28px; height: 28px;
    background: transparent; border: none;
    border-radius: 6px; cursor: pointer;
    color: var(--muted); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .sidebar-close:hover { background: var(--surface2); color: var(--text); }
  /* Overlay saat sidebar terbuka di mobile */
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 199;
  }
  .sidebar-overlay.show { display: block; }
  .sidebar-brand {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-brand .logo { font-size: 10px; padding: 4px 10px; }
  .sidebar-brand-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .sidebar-brand-sub { font-size: 10px; color: var(--muted); }
  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-section-label {
    font-size: 9px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    padding: 0 8px; margin-bottom: 4px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 7px;
    font-size: 13px; font-weight: 500; color: var(--muted);
    cursor: pointer; text-decoration: none; transition: all .15s; margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: color-mix(in srgb, var(--shopee) 15%, transparent); color: var(--text); }
  .sidebar-item.active .sidebar-icon { color: var(--shopee); }
  .sidebar-icon { font-size: 15px; width: 18px; text-align: center; }
  .sidebar-badge {
    margin-left: auto; background: var(--shopee); color: white;
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px;
  }

  /* Content */

  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    background: var(--shopee); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; padding: 5px 12px; border-radius: 4px;
  }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-left: auto; }

  .main { padding: 24px 28px; }

  /* Platform Toggle */
  .platform-toggle {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; margin-bottom: 20px;
    width: fit-content;
  }
  .platform-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 18px; border-radius: 7px;
    font-size: 13px; font-weight: 600;
    border: none; cursor: pointer;
    transition: all .2s; color: var(--muted); background: transparent;
    font-family: 'Inter', sans-serif;
  }
  .platform-btn.active-shopee { background: var(--shopee); color: white; }
  .platform-btn.active-tiktok { background: var(--tiktok); color: white; }
  .platform-btn.active-all    { background: #6366f1; color: white; }
  .platform-btn:not(.active-shopee):not(.active-tiktok):not(.active-all):hover {
    background: var(--surface); color: var(--text);
  }
  .platform-logo { font-size: 15px; line-height:1; display:flex; align-items:center; }
  .platform-logo svg { border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.3); }

  /* KPI */
  .kpi-row {
    display: grid;
    gap: 10px; margin-bottom: 10px;
  }
  .kpi-row-top    { grid-template-columns: repeat(5, 1fr); }
  .kpi-row-bottom { grid-template-columns: repeat(7, 1fr); margin-bottom: 20px; }

  /* Shopee vs TikTok Comparison */
  .compare-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 22px; margin-bottom: 20px;
  }
  .compare-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .compare-title { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .compare-title .icon { font-size: 15px; }
  .compare-subtitle { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .compare-legend { display: flex; gap: 16px; }
  .compare-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; }
  .compare-legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  .compare-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  }
  .compare-metric {
    background: var(--surface2); border-radius: 10px; padding: 14px 14px 12px;
    border: 1px solid var(--border);
  }
  .compare-metric-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); margin-bottom: 10px;
  }
  .compare-bars { display: flex; flex-direction: column; gap: 7px; margin-bottom: 8px; }
  .compare-bar-row { display: flex; align-items: center; gap: 7px; }
  .compare-bar-platform { width: 14px; font-size: 9px; font-weight: 800; flex-shrink: 0; }
  .compare-bar-track {
    flex: 1; height: 14px; background: var(--bg); border-radius: 5px; overflow: hidden; position: relative; min-width: 30px;
  }
  .compare-bar-fill {
    height: 100%; border-radius: 5px; transition: width .4s ease;
    min-width: 2px;
  }
  .compare-bar-value {
    font-size: 10.5px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace;
    white-space: nowrap; flex-shrink: 0; min-width: 64px; text-align: right;
  }
  .compare-diff {
    font-size: 10px; font-weight: 600; padding-top: 6px; border-top: 1px dashed var(--border);
    display: flex; align-items: center; gap: 4px;
  }
  .compare-diff.positive { color: #10b981; }
  .compare-diff.negative { color: #f43f5e; }
  .compare-diff.neutral  { color: var(--muted); }
  .compare-winner-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 20px;
    margin-left: auto;
  }
  .compare-winner-badge.shopee { background: color-mix(in srgb, var(--shopee) 18%, transparent); color: var(--shopee); }
  .compare-winner-badge.tiktok { background: color-mix(in srgb, var(--tiktok) 18%, transparent); color: var(--tiktok); }

  @media (max-width: 1100px) {
    .compare-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .compare-grid { grid-template-columns: 1fr; }
    .compare-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 3px solid var(--accent); border-radius: 8px; padding: 14px 16px;
  }
  .kpi-label { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .kpi-value { font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-bottom: 3px; }
  .kpi-delta { font-size: 9px; color: var(--muted); }
  .kpi-full {
    font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    margin-bottom: 2px; opacity: 0; max-height: 0; overflow: hidden; transition: all .2s;
  }
  .kpi:hover .kpi-full { opacity: 1; max-height: 20px; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
  }
  .toolbar-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-right: 2px; white-space: nowrap; }
  .toggle {
    display: flex; align-items: center; gap: 6px; padding: 5px 11px;
    border-radius: 20px; border: 1.5px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; font-weight: 500;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all .15s;
  }
  .toggle.active {
    border-color: var(--accent); color: var(--text);
    background: color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .toggle .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* Chart */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
  .chart-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 320px; }

  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); gap: 12px; font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--shopee); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: #2d1515; border: 1px solid #5c2020; border-radius: 8px; padding: 16px; color: #f87171; font-size: 13px; margin-bottom: 16px; }

  @media (max-width: 900px) {
    .sidebar { transform: translateX(-220px); }
    .content-area { margin-left: 0 !important; }
    .main { padding: 16px; }
    .kpi-row-top    { grid-template-columns: repeat(2, 1fr); }
    .kpi-row-bottom { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 12px 16px; }
  }
</style>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="toggleSidebar()" title="Tutup sidebar">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="sidebar-brand">
      <span class="logo">S</span>
      <div>
        <div class="sidebar-brand-name">Wookey Weight</div>
        <div class="sidebar-brand-sub">Official Store</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Analytics</div>
      <a class="sidebar-item active" href="#">
        <span class="sidebar-icon">📊</span>
        Overview

      </a>
      <a class="sidebar-item" href="sumber.html">
        <span class="sidebar-icon">🎯</span>
        Sumber Penjualan
      </a>
      <a class="sidebar-item" href="live.html">
        <span class="sidebar-icon">🔴</span>
        Live Streaming
      </a>
      <a class="sidebar-item" href="marketscope.html">
        <span class="sidebar-icon">🧭</span>
        Market Scope
      </a>
      <a class="sidebar-item" href="#" style="opacity:.5;pointer-events:none;">
        <span class="sidebar-icon">📦</span>
        Produk
        <span style="margin-left:auto;font-size:9px;color:var(--muted);">Soon</span>
      </a>
      <a class="sidebar-item" href="marketing.html">
        <span class="sidebar-icon">📣</span>
        Marketing
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Data</div>
      <a class="sidebar-item" href="https://docs.google.com/spreadsheets/d/1l8xk-SOZdmYQvHabXisCrVNCh8lcfQ-yHYnhiXE0KME" target="_blank">
        <span class="sidebar-icon">📋</span>
        Google Sheets
      </a>
      <a class="sidebar-item" href="https://drive.google.com" target="_blank">
        <span class="sidebar-icon">📁</span>
        Google Drive
      </a>
    </div>
    <div style="margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);">
      <div style="font-size:10px;color:var(--muted);text-align:center;">Auto-update setiap hari 10:00</div>
    </div>
  </aside>

  <!-- Content -->
  <div class="content-area">
    <!-- Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="header">
      <button onclick="toggleSidebar()" style="background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;color:var(--muted);flex-shrink:0;transition:all .15s;" title="Toggle sidebar" onmouseover="this.style.background='var(--surface2)';this.style.color='var(--text)'" onmouseout="this.style.background='transparent';this.style.color='var(--muted)'">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="7.25" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="11.5" width="14" height="1.5" rx=".75" fill="currentColor"/></svg>
      </button>
      <span class="logo" id="header-logo">S</span>
      <span class="header-title">Overview</span>
      <span class="header-sub" id="date-range">Memuat...</span>
    </div>

    <div class="main">
      <div id="error-container"></div>

      <!-- Platform Toggle -->
      <div class="platform-toggle">
        <button class="platform-btn active-all" id="btn-all" onclick="setPlatform('all')">
          <span class="platform-logo">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="18" height="18" rx="4" fill="white"/>
              <rect x="2" y="2" width="6" height="6" rx="1" fill="#6366f1"/>
              <rect x="10" y="2" width="6" height="6" rx="1" fill="#6366f1"/>
              <rect x="2" y="10" width="6" height="6" rx="1" fill="#6366f1"/>
              <rect x="10" y="10" width="6" height="6" rx="1" fill="#6366f1"/>
            </svg>
          </span> All Platform
        </button>
        <button class="platform-btn" id="btn-shopee" onclick="setPlatform('shopee')">
          <span class="platform-logo">
            <svg width="18" height="18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="100" height="100" rx="16" fill="white"/>
              <!-- Shopee bag shape -->
              <path d="M50 8 C38 8 28 16 28 27 L22 27 C19 27 17 29 16 32 L10 75 C9 79 12 83 16 83 L84 83 C88 83 91 79 90 75 L84 32 C83 29 81 27 78 27 L72 27 C72 16 62 8 50 8 Z" fill="#EE4D2D"/>
              <!-- Handle -->
              <path d="M38 27 C38 20 43 15 50 15 C57 15 62 20 62 27" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
              <!-- S letter -->
              <path d="M42 47 C42 44 44 42 48 42 L54 42 C57 42 58 44 58 46 C58 48 56 49 53 50 L48 51 C44 52 42 54 42 57 C42 60 44 62 48 62 L54 62 C57 62 58 60 58 58" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/>
            </svg>
          </span> Shopee
        </button>
        <button class="platform-btn" id="btn-tiktok" onclick="setPlatform('tiktok')">
          <span class="platform-logo">
            <svg width="18" height="18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="100" height="100" rx="16" fill="white"/>
              <!-- TikTok note shape -->
              <path d="M65 18 C65 18 68 28 78 31 L78 44 C78 44 70 44 65 40 L65 62 C65 74 55 83 44 81 C33 79 26 69 29 58 C32 47 44 42 54 47 L54 61 C50 59 45 60 43 64 C41 68 44 73 49 73 C54 73 57 69 57 64 L57 18 L65 18 Z" fill="#010101"/>
            </svg>
          </span> TikTok
        </button>
      </div>

      <!-- KPI -->
      <div class="kpi-row kpi-row-top" id="kpi-top">
        <div class="loading" style="grid-column:1/-1"><div class="spinner"></div> Memuat data...</div>
      </div>
      <div class="kpi-row kpi-row-bottom" id="kpi-bottom"></div>

      <!-- Shopee vs TikTok Comparison (hanya tampil di toggle All Platform) -->
      <div id="compare-section" style="display:none;"></div>

      <!-- Toolbar Metrik -->
      <div class="toolbar" id="toolbar-metrics">
        <span class="toolbar-label">Tampilkan:</span>
        <button class="toggle" data-metric="Live Show PV" style="--accent:var(--c-show)"><span class="dot"></span>Live Show PV</button>
        <button class="toggle active" data-metric="Live Watch PV" style="--accent:var(--c-watch)"><span class="dot"></span>Live Watch PV</button>
        <button class="toggle active" data-metric="Click Product" style="--accent:var(--c-click)"><span class="dot"></span>Click Product</button>
        <button class="toggle active" data-metric="Order Number" style="--accent:var(--c-order)"><span class="dot"></span>Order Number</button>
        <button class="toggle active" data-metric="GMV" style="--accent:var(--c-gmv)"><span class="dot"></span>GMV</button>
        <button class="toggle" data-metric="ERR" style="--accent:var(--c-err)"><span class="dot"></span>ERR</button>
        <button class="toggle" data-metric="CTR" style="--accent:var(--c-ctr)"><span class="dot"></span>CTR</button>
        <button class="toggle" data-metric="CTOR" style="--accent:var(--c-ctor)"><span class="dot"></span>CTOR</button>
        <button class="toggle" data-metric="AOV" style="--accent:var(--c-aov)"><span class="dot"></span>AOV</button>
        <button class="toggle" data-metric="ARPU" style="--accent:#34d399"><span class="dot" style="background:#34d399"></span>ARPU</button>
        <button class="toggle" data-metric="Biaya Iklan" style="--accent:#f43f5e" id="toggle-biaya"><span class="dot" style="background:#f43f5e"></span>Biaya Iklan</button>
        <button class="toggle" data-metric="ROI" style="--accent:#a78bfa" id="toggle-roi"><span class="dot" style="background:#a78bfa"></span>ROI</button>
      </div>

      <!-- Toolbar Periode -->
      <div class="toolbar">
        <span class="toolbar-label">Tampilkan per:</span>
        <button class="toggle" data-quick="yesterday" onclick="quickSelect('yesterday')" style="--accent:#94a3b8">Kemarin</button>
        <button class="toggle" data-quick="7days" onclick="quickSelect('7days')" style="--accent:#94a3b8">7 Hari</button>
        <button class="toggle" data-quick="30days" onclick="quickSelect('30days')" style="--accent:#94a3b8">30 Hari</button>
        <div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>
        <button class="toggle active" data-group="day" onclick="setGroup('day')">Per Hari</button>
        <button class="toggle" data-group="week" onclick="setGroup('week')">Per Minggu</button>
        <button class="toggle" data-group="month" onclick="setGroup('month')">Per Bulan</button>
        <button class="toggle" data-group="custom" onclick="setGroup('custom')">Custom</button>
      </div>

      <!-- Period Filter -->
      <div id="period-filter" style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;">
        <span class="toolbar-label">Periode:</span>
        <div id="filter-day" style="display:flex;align-items:center;gap:8px;">

          <button onclick="applyFilterWeek()" class="toggle active" style="--accent:var(--shopee)">Terapkan</button>
        </div>

          <span style="color:var(--muted);font-size:12px;">s/d</span>
          <input type="date" id="custom-to" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 8px;font-family:'JetBrains Mono',monospace;">
          <button onclick="applyFilterCustom()" class="toggle active" style="--accent:var(--shopee)">Terapkan</button>

      <!-- Chart -->
      <div class="chart-card">
        <div class="chart-title" id="chart-title">Tren Harian</div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1l8xk-SOZdmYQvHabXisCrVNCh8lcfQ-yHYnhiXE0KME';

const SOURCES = {
  shopee: { sheetName: 'Shopee Stats Harian',  label: 'Shopee',       color: '#EE4D2D', hasAds: true  },
  tiktok: { sheetName: 'TikTok Stats Harian',  label: 'TikTok',       color: '#ff0050', hasAds: true  },
  all:    { sheetName: null,                    label: 'All Platform', color: '#6366f1', hasAds: true  },
};

const METRICS = {
  'Live Show PV':  { color: '#64748b', format: 'number', axis: 'y2' },
  'Live Watch PV': { color: '#8b5cf6', format: 'number', axis: 'y2' },
  'Click Product': { color: '#3b82f6', format: 'number', axis: 'y2' },
  'Order Number':  { color: '#10b981', format: 'number', axis: 'y2' },
  'GMV':           { color: '#f59e0b', format: 'rp',     axis: 'y1' },
  'ERR':           { color: '#e879f9', format: 'pct',    axis: 'y3' },
  'CTOR':          { color: '#06b6d4', format: 'pct',    axis: 'y3' },
  'CTR':           { color: '#ec4899', format: 'pct',    axis: 'y3' },
  'AOV':           { color: '#f97316', format: 'rp',     axis: 'y1' },
  'ARPU':          { color: '#34d399', format: 'rp',     axis: 'y1' },
  'Biaya Iklan':   { color: '#f43f5e', format: 'rp',     axis: 'y1' },
  'ROI':           { color: '#a78bfa', format: 'roi',    axis: 'y2' },
};

// Tingkat atas: metrik finansial utama
const KPI_TOP = [
  { key: 'GMV',         label: 'GMV',         accent: '#f59e0b' },
  { key: 'AOV',         label: 'AOV',         accent: '#f97316' },
  { key: 'ARPU',        label: 'ARPU',        accent: '#34d399' },
  { key: 'Biaya Iklan', label: 'Biaya Iklan', accent: '#f43f5e' },
  { key: 'ROI',         label: 'ROI',         accent: '#a78bfa' },
];

// Tingkat bawah: metrik traffic & konversi
const KPI_BOTTOM = [
  { key: 'Live Show PV',  label: 'Live Show PV',  accent: '#64748b' },
  { key: 'Live Watch PV', label: 'Live Watch PV', accent: '#8b5cf6' },
  { key: 'Click Product', label: 'Click Product', accent: '#3b82f6' },
  { key: 'Order Number',  label: 'Order Number',  accent: '#10b981' },
  { key: 'ERR',           label: 'ERR',           accent: '#e879f9' },
  { key: 'CTR',           label: 'CTR',           accent: '#ec4899' },
  { key: 'CTOR',          label: 'CTOR',          accent: '#06b6d4' },
];

// Untuk backward compat (chart toolbar dll)
const KPI_LIST = [...KPI_TOP, ...KPI_BOTTOM];

function fmtRp(v) {
  if (v >= 1e9) return 'Rp ' + (v/1e9).toFixed(1) + 'M';
  if (v >= 1e6) return 'Rp ' + (v/1e6).toFixed(1) + 'jt';
  return 'Rp ' + Math.round(v).toLocaleString('id-ID');
}
function fmtNum(v) {
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return Math.round(v).toLocaleString('id-ID');
}
function fmtPct(v) { return Number(v).toFixed(2) + '%'; }
function fmtRoi(v) { return Number(v).toFixed(2) + 'x'; }
function fmt(v, type) {
  if (type === 'rp')  return fmtRp(v);
  if (type === 'pct') return fmtPct(v);
  if (type === 'roi') return fmtRoi(v);
  return fmtNum(v);
}

// Cache data per platform
const dataCache = { shopee: null, tiktok: null };
let currentPlatform = 'shopee';
let globalData = [];
let filteredData = [];
let currentGroup = 'day';

async function fetchSheetData(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1&_cb=${Date.now()}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^.*?({.*}).*$/s, '$1'));

  // gviz kadang mengembalikan header sebagai baris data pertama
  // Deteksi: kalau cols[0].label kosong, pakai row[0] sebagai header
  let cols = json.table.cols.map(c => c.label);
  let rows = json.table.rows;
  if (!cols[0] && rows.length > 0) {
    // Ambil header dari baris pertama
    cols = rows[0].c.map(cell => (cell && cell.v) ? String(cell.v) : '');
    rows = rows.slice(1);  // skip header row
  }

  // Kolom non-numerik
  const STR_COLS = new Set(['Tanggal']);

  return rows.map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      if (!col) return;
      const cell = row.c[i];
      if (!cell || cell.v === null || cell.v === undefined) {
        obj[col] = STR_COLS.has(col) ? '' : 0;
        return;
      }
      // Semua nilai dari gviz bisa berupa string — konversi ke number kecuali Tanggal
      if (STR_COLS.has(col)) {
        obj[col] = String(cell.v);
      } else {
        const n = parseFloat(String(cell.v).replace(',', '.'));
        obj[col] = isNaN(n) ? 0 : n;
      }
    });

    // CTR/CTOR/ERR: hitung ulang langsung dari volume mentah (Click/Watch/Order/Show)
    // supaya akurat dan konsisten untuk SEMUA platform — tidak bergantung pada
    // nilai kolom CTR/CTOR/ERR di sheet yang formatnya bisa beda-beda (desimal vs persen).
    const klikRaw  = Number(obj['Click Product'])  || 0;
    const watchRaw = Number(obj['Live Watch PV'])  || 0;
    const orderRaw = Number(obj['Order Number'])   || 0;
    const showRaw  = Number(obj['Live Show PV'])   || 0;

    obj['CTR']  = watchRaw > 0 ? (klikRaw  / watchRaw) * 100 : 0;
    obj['CTOR'] = klikRaw  > 0 ? (orderRaw / klikRaw)  * 100 : 0;
    obj['ERR']  = showRaw  > 0 ? (watchRaw / showRaw)  * 100 : 0;
    obj['Biaya Iklan'] = Number(obj['Biaya Iklan']) || 0;
    return obj;
  }).filter(r => r['Tanggal'] && r['Tanggal'] !== 'Tanggal');
}

async function loadPlatform(platform) {
  if (dataCache[platform]) return dataCache[platform];
  const src = SOURCES[platform];
  const data = await fetchSheetData(src.sheetName);
  dataCache[platform] = data;
  return data;
}

async function loadAllPlatforms() {
  // Load Shopee + TikTok paralel
  const [shopeeData, tiktokData] = await Promise.all([
    loadPlatform('shopee'),
    loadPlatform('tiktok'),
  ]);

  // Simpan mentah untuk dipakai compare section (difilter ulang sesuai periode aktif)
  rawShopeeData = shopeeData;
  rawTiktokData = tiktokData;

  // Gabungkan per tanggal: jumlahkan semua kolom numerik
  const merged = {};
  const numCols = ['GMV','Order Number','Click Product','Live Watch PV','Live Show PV','Pembeli','Biaya Iklan'];

  [...shopeeData, ...tiktokData].forEach(row => {
    const tgl = row['Tanggal'];
    if (!tgl) return;
    if (!merged[tgl]) merged[tgl] = { 'Tanggal': tgl };
    numCols.forEach(col => {
      merged[tgl][col] = (merged[tgl][col] || 0) + (Number(row[col]) || 0);
    });
  });

  // Hitung rasio dari total gabungan
  return Object.values(merged).map(d => {
    const gmv   = d['GMV']           || 0;
    const order = d['Order Number']  || 0;
    const klik  = d['Click Product'] || 0;
    const watch = d['Live Watch PV'] || 0;
    const show  = d['Live Show PV']  || 0;
    const buyer = d['Pembeli']       || 0;
    const biaya = d['Biaya Iklan']   || 0;

    d['Konversi %'] = watch > 0 ? (watch / (show || 1)) * 100 : 0;
    d['CTR']        = watch > 0 ? (klik / watch)   * 100 : 0;
    d['CTOR']       = klik  > 0 ? (order / klik)   * 100 : 0;
    d['AOV']        = order > 0 ? gmv / order  : 0;
    d['ERR']        = show  > 0 ? (watch / show)   * 100 : 0;
    d['ARPU']       = buyer > 0 ? gmv / buyer  : 0;
    d['ROI']        = biaya > 0 ? Math.round(gmv / biaya * 100) / 100 : 0;
    return d;
  }).sort((a, b) => a['Tanggal'].localeCompare(b['Tanggal']));
}

// ── Shopee vs TikTok Comparison Section ──────────────────────────
let rawShopeeData = [];
let rawTiktokData = [];

function fmtCompareValue(val, type) {
  if (type === 'rp') {
    if (Math.abs(val) >= 1e9) return 'Rp' + (val/1e9).toFixed(2) + 'M';
    if (Math.abs(val) >= 1e6) return 'Rp' + (val/1e6).toFixed(1) + 'jt';
    if (Math.abs(val) >= 1e3) return 'Rp' + (val/1e3).toFixed(0) + 'rb';
    return 'Rp' + Math.round(val).toLocaleString('id-ID');
  }
  if (type === 'pct') return val.toFixed(2) + '%';
  if (type === 'roi') return val.toFixed(2) + 'x';
  if (type === 'int') {
    if (Math.abs(val) >= 1e6) return (val/1e6).toFixed(2) + 'jt';
    if (Math.abs(val) >= 1e3) return (val/1e3).toFixed(1) + 'rb';
    return Math.round(val).toLocaleString('id-ID');
  }
  return String(val);
}

function calcCompareMetrics(rows) {
  const totalGMV     = rows.reduce((s,d) => s + (Number(d['GMV']) || 0), 0);
  const totalOrder   = rows.reduce((s,d) => s + (Number(d['Order Number']) || 0), 0);
  const totalClick   = rows.reduce((s,d) => s + (Number(d['Click Product']) || 0), 0);
  const totalWatch   = rows.reduce((s,d) => s + (Number(d['Live Watch PV']) || 0), 0);
  const totalPembeli = rows.reduce((s,d) => s + (Number(d['Pembeli']) || 0), 0);
  const totalBiaya   = rows.reduce((s,d) => s + (Number(d['Biaya Iklan']) || 0), 0);

  const ctr  = totalWatch > 0 ? (totalClick / totalWatch) * 100 : 0;
  const ctor = totalClick > 0 ? (totalOrder / totalClick) * 100 : 0;
  const aov  = totalOrder > 0 ? totalGMV / totalOrder : 0;
  const arpu = totalPembeli > 0 ? totalGMV / totalPembeli : 0;
  const roi  = totalBiaya > 0 ? totalGMV / totalBiaya : 0;

  return {
    'GMV':           { val: totalGMV,   type: 'rp'  },
    'Order Number':  { val: totalOrder, type: 'int' },
    'CTR':           { val: ctr,        type: 'pct' },
    'CTOR':          { val: ctor,       type: 'pct' },
    'AOV':           { val: aov,        type: 'rp'  },
    'ARPU':          { val: arpu,       type: 'rp'  },
    'Biaya Iklan':   { val: totalBiaya, type: 'rp'  },
    'ROI':           { val: roi,        type: 'roi' },
  };
}

function renderCompareSection(dateFrom, dateTo) {
  const section = document.getElementById('compare-section');
  if (currentPlatform !== 'all') { section.style.display = 'none'; return; }
  section.style.display = '';

  const inRange = (d) => d['Tanggal'] >= dateFrom && d['Tanggal'] <= dateTo;
  const shopeeRows = rawShopeeData.filter(inRange);
  const tiktokRows = rawTiktokData.filter(inRange);

  if (!shopeeRows.length && !tiktokRows.length) {
    section.innerHTML = '';
    return;
  }

  const sMetrics = calcCompareMetrics(shopeeRows);
  const tMetrics = calcCompareMetrics(tiktokRows);

  const metricOrder = ['GMV','Order Number','CTR','CTOR','AOV','ARPU','Biaya Iklan','ROI'];
  const metricMeta = {
    'GMV':          { label: 'GMV',          icon: '💰', higherIsBetter: true  },
    'Order Number': { label: 'Order',        icon: '📦', higherIsBetter: true  },
    'CTR':          { label: 'CTR',          icon: '🎯', higherIsBetter: true  },
    'CTOR':         { label: 'CTOR',         icon: '🛒', higherIsBetter: true  },
    'AOV':          { label: 'AOV',          icon: '🧾', higherIsBetter: true  },
    'ARPU':         { label: 'ARPU',         icon: '👤', higherIsBetter: true  },
    'Biaya Iklan':  { label: 'Biaya Iklan',  icon: '📣', higherIsBetter: false },
    'ROI':          { label: 'ROI',          icon: '📈', higherIsBetter: true  },
  };

  const cardsHtml = metricOrder.map(key => {
    const meta = metricMeta[key];
    const s = sMetrics[key], t = tMetrics[key];
    const maxVal = Math.max(s.val, t.val, 0.0001);
    const sPct = Math.max((s.val / maxVal) * 100, s.val > 0 ? 3 : 0);
    const tPct = Math.max((t.val / maxVal) * 100, t.val > 0 ? 3 : 0);

    let diffPct = 0;
    if (s.val !== 0) diffPct = ((t.val - s.val) / Math.abs(s.val)) * 100;
    else if (t.val !== 0) diffPct = 100;

    const tiktokBetter = meta.higherIsBetter ? (t.val > s.val) : (t.val < s.val) && t.val > 0;
    const shopeeBetter = meta.higherIsBetter ? (s.val > t.val) : (s.val < t.val) && s.val > 0;
    const winner = tiktokBetter ? 'tiktok' : (shopeeBetter ? 'shopee' : null);
    const winnerLabel = winner === 'tiktok' ? 'TikTok 👑' : (winner === 'shopee' ? 'Shopee 👑' : '');

    const diffClass = Math.abs(diffPct) < 1 ? 'neutral' : (
      (meta.higherIsBetter ? diffPct > 0 : diffPct < 0) ? 'positive' : 'negative'
    );
    const diffArrow = diffPct > 0 ? '▲' : (diffPct < 0 ? '▼' : '—');
    const diffText = isFinite(diffPct) ? `${diffArrow} ${Math.abs(diffPct).toFixed(0)}% vs Shopee` : '';

    return `
      <div class="compare-metric">
        <div class="compare-metric-label">
          <span>${meta.icon} ${meta.label}</span>
          ${winnerLabel ? `<span class="compare-winner-badge ${winner}">${winnerLabel}</span>` : ''}
        </div>
        <div class="compare-bars">
          <div class="compare-bar-row">
            <span class="compare-bar-platform" style="color:var(--shopee)">S</span>
            <div class="compare-bar-track">
              <div class="compare-bar-fill" style="width:${sPct}%;background:var(--shopee);"></div>
            </div>
            <span class="compare-bar-value">${fmtCompareValue(s.val, s.type)}</span>
          </div>
          <div class="compare-bar-row">
            <span class="compare-bar-platform" style="color:var(--tiktok)">T</span>
            <div class="compare-bar-track">
              <div class="compare-bar-fill" style="width:${tPct}%;background:var(--tiktok);"></div>
            </div>
            <span class="compare-bar-value">${fmtCompareValue(t.val, t.type)}</span>
          </div>
        </div>
        <div class="compare-diff ${diffClass}">${diffText}</div>
      </div>
    `;
  }).join('');

  section.innerHTML = `
    <div class="compare-card">
      <div class="compare-header">
        <div>
          <div class="compare-title"><span class="icon">⚖️</span>Shopee vs TikTok — Perbandingan Performa</div>
          <div class="compare-subtitle">${dateFrom} — ${dateTo} · Kedua platform punya karakteristik & basis pelanggan berbeda, jadi hasilnya wajar tidak sama</div>
        </div>
        <div class="compare-legend">
          <div class="compare-legend-item" style="color:var(--shopee)"><span class="compare-legend-dot" style="background:var(--shopee)"></span>Shopee</div>
          <div class="compare-legend-item" style="color:var(--tiktok)"><span class="compare-legend-dot" style="background:var(--tiktok)"></span>TikTok</div>
        </div>
      </div>
      <div class="compare-grid">${cardsHtml}</div>
    </div>
  `;
}

function setPlatform(platform) {
  currentPlatform = platform;
  const src = SOURCES[platform];

  // Update toggle button styles
  document.getElementById('btn-shopee').className = 'platform-btn' + (platform === 'shopee' ? ' active-shopee' : '');
  document.getElementById('btn-tiktok').className = 'platform-btn' + (platform === 'tiktok' ? ' active-tiktok' : '');
  document.getElementById('btn-all').className    = 'platform-btn' + (platform === 'all'    ? ' active-all'    : '');

  // Biaya Iklan & ROI: tampilkan untuk Shopee & All
  const biayaBtn = document.getElementById('toggle-biaya');
  const roiBtn   = document.getElementById('toggle-roi');
  const showAds  = true;  // Shopee & TikTok keduanya punya Biaya Iklan
  biayaBtn.style.display = showAds ? '' : 'none';
  roiBtn.style.display   = showAds ? '' : 'none';
  if (!showAds) { biayaBtn.classList.remove('active'); roiBtn.classList.remove('active'); }

  // Update header warna
  document.querySelector('.logo').style.background = src.color;

  // Load data
  document.getElementById('kpi-top').innerHTML = '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div> Memuat data ' + src.label + '...</div>';
  document.getElementById('kpi-bottom').innerHTML = '';
  document.getElementById('compare-section').style.display = 'none';

  const loadPromise = platform === 'all' ? loadAllPlatforms() : loadPlatform(platform);

  loadPromise.then(data => {
    globalData   = data;
    filteredData = [...data];
    renderKPI(filteredData);
    renderChart(filteredData);
    const dates = data.map(d => d['Tanggal']).sort();
    document.getElementById('date-single').value = dates[dates.length - 1] || '';
    document.getElementById('custom-from').value = dates[0] || '';
    document.getElementById('custom-to').value   = dates[dates.length - 1] || '';
    buildWeekOptions();
    buildMonthOptions();
    document.querySelectorAll('[data-group]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('[data-quick]').forEach(b => b.classList.remove('active'));
    const yBtn = document.querySelector('[data-quick="yesterday"]');
    if (yBtn) { yBtn.classList.add('active'); quickSelect('yesterday'); }
    document.getElementById('period-filter').style.display = 'none';
    updateDateRange(filteredData);
  }).catch(err => {
    document.getElementById('error-container').innerHTML = `<div class="error">❌ Gagal memuat data ${src.label}: ${err.message}</div>`;
    document.getElementById('kpi-top').innerHTML = '';
    document.getElementById('kpi-bottom').innerHTML = '';
  });
}

function calcKPI(data) {
  const totalShowPV  = data.reduce((s, d) => s + (d['Live Show PV']  || 0), 0);
  const totalWatchPV = data.reduce((s, d) => s + (d['Live Watch PV'] || 0), 0);
  const totalClick   = data.reduce((s, d) => s + (d['Click Product'] || 0), 0);
  const totalOrder   = data.reduce((s, d) => s + (d['Order Number']  || 0), 0);
  const totalGMV     = data.reduce((s, d) => s + (d['GMV']           || 0), 0);
  const totalPembeli = data.reduce((s, d) => s + (Number(d['Pembeli']) || 0), 0);
  const totalBiaya   = data.reduce((s, d) => s + (Number(d['Biaya Iklan']) || 0), 0);

  const err  = totalShowPV  > 0 ? (totalWatchPV / totalShowPV)  * 100 : 0;
  const ctr  = totalWatchPV > 0 ? (totalClick   / totalWatchPV) * 100 : 0;
  const ctor = totalClick   > 0 ? (totalOrder   / totalClick)   * 100 : 0;
  const aov  = totalOrder   > 0 ? totalGMV     / totalOrder   : 0;
  const arpu = totalPembeli > 0 ? totalGMV     / totalPembeli : 0;
  const roi  = totalBiaya   > 0 ? Math.round(totalGMV / totalBiaya * 100) / 100 : 0;
  // Untuk 'all': hasAds dianggap true karena Shopee punya Biaya Iklan

  return {
    'Live Show PV': totalShowPV, 'Live Watch PV': totalWatchPV,
    'Click Product': totalClick, 'Order Number': totalOrder,
    'GMV': totalGMV, 'ERR': err, 'CTR': ctr, 'CTOR': ctor,
    'AOV': aov, 'ARPU': arpu, 'Biaya Iklan': totalBiaya, 'ROI': roi,
  };
}

function makeKpiCard(k, kpi, days, hasAds) {
  if (!hasAds && ['Biaya Iklan','ROI'].includes(k.key)) {
    return `<div class="kpi" style="--accent:${k.accent};opacity:.3">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:var(--muted)">—</div>
      <div class="kpi-delta">Tidak tersedia</div>
    </div>`;
  }
  const val  = kpi[k.key] || 0;
  const type = METRICS[k.key]?.format || 'number';
  const isVolume = ['Live Show PV','Live Watch PV','Click Product','Order Number'].includes(k.key);
  const isMoney  = ['GMV','Biaya Iklan'].includes(k.key);
  const isARPU   = k.key === 'ARPU';
  const displayVal = isVolume
    ? Math.round(val).toLocaleString('id-ID')
    : isARPU ? 'Rp ' + Math.round(val).toLocaleString('id-ID')
    : fmt(val, type);
  const fullVal = isMoney
    ? `<div class="kpi-full">Rp ${Math.round(val).toLocaleString('id-ID')}</div>` : '';
  const sub = ['ERR','CTOR','CTR','AOV','ARPU'].includes(k.key)
    ? `<div class="kpi-delta">Kalkulasi ${days} hari</div>`
    : `<div class="kpi-delta">Total ${days} hari</div>`;
  return `<div class="kpi" style="--accent:${k.accent}">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-value">${displayVal}</div>
    ${fullVal}${sub}
  </div>`;
}

function renderKPI(data) {
  const kpi  = calcKPI(data);
  const days = data.length;
  const src  = SOURCES[currentPlatform];

  // Tingkat atas: GMV, AOV, ARPU, Biaya Iklan, ROI
  document.getElementById('kpi-top').innerHTML =
    KPI_TOP.map(k => makeKpiCard(k, kpi, days, src.hasAds)).join('');

  // Tingkat bawah: Live Show PV, Live Watch PV, Click Product, Order Number, ERR, CTR, CTOR
  document.getElementById('kpi-bottom').innerHTML =
    KPI_BOTTOM.map(k => makeKpiCard(k, kpi, days, src.hasAds)).join('');
}

let chartInstance = null;
function getActive() {
  return [...document.querySelectorAll('.toggle.active[data-metric]')].map(b => b.dataset.metric);
}

function groupData(data, group) {
  if (group === 'day' || group === 'custom') {
    return data.map(d => {
      const biaya = Number(d['Biaya Iklan']) || 0;
      const gmv   = Number(d['GMV']) || 0;
      return Object.assign({}, d, { 'ROI': biaya > 0 ? Math.round(gmv / biaya * 100) / 100 : 0 });
    });
  }
  const grouped = {};
  data.forEach(d => {
    const date = new Date(d['Tanggal']);
    let key;
    if (group === 'week') {
      const day = date.getDay(), diff = (day === 0 ? -6 : 1 - day);
      const mon = new Date(date); mon.setDate(date.getDate() + diff);
      key = mon.toISOString().split('T')[0];
    } else {
      key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    }
    if (!grouped[key]) {
      grouped[key] = { 'Tanggal': key, 'Live Show PV':0,'Live Watch PV':0,'Click Product':0,'Order Number':0,'GMV':0,'Pembeli':0,'Biaya Iklan':0 };
    }
    ['Live Show PV','Live Watch PV','Click Product','Order Number','GMV','Pembeli','Biaya Iklan'].forEach(k => {
      grouped[key][k] = (grouped[key][k] || 0) + (Number(d[k]) || 0);
    });
  });
  return Object.values(grouped).map(g => {
    g['ERR']  = g['Live Show PV']  > 0 ? (g['Live Watch PV'] / g['Live Show PV'])  * 100 : 0;
    g['CTR']  = g['Live Watch PV'] > 0 ? (g['Click Product'] / g['Live Watch PV']) * 100 : 0;
    g['CTOR'] = g['Click Product'] > 0 ? (g['Order Number']  / g['Click Product']) * 100 : 0;
    g['AOV']  = g['Order Number']  > 0 ? g['GMV']           / g['Order Number']  : 0;
    g['ARPU'] = g['Pembeli']       > 0 ? g['GMV']           / g['Pembeli']       : 0;
    g['ROI']  = g['Biaya Iklan']   > 0 ? Math.round(g['GMV'] / g['Biaya Iklan'] * 100) / 100 : 0;
    return g;
  });
}

function renderChart(data) {
  data = groupData(data, currentGroup);
  const labels  = data.map(d => d['Tanggal']);
  const active  = getActive();
  const datasets = active.map(key => {
    const m = METRICS[key];
    return {
      label: key, data: data.map(d => d[key] || 0),
      borderColor: m.color, backgroundColor: m.color + '18',
      pointBackgroundColor: m.color, pointRadius: 4, pointHoverRadius: 7,
      tension: 0.3, yAxisID: m.axis, fill: false,
    };
  });
  const hasY1 = active.some(k => METRICS[k]?.axis === 'y1');
  const hasY2 = active.some(k => METRICS[k]?.axis === 'y2');
  const hasY3 = active.some(k => METRICS[k]?.axis === 'y3');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('mainChart').getContext('2d'), {
    type: 'line', data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#e8eaf2', font: { size: 12 }, boxWidth: 12 } },
        tooltip: {
          backgroundColor: '#13151f', borderColor: '#252836', borderWidth: 1,
          titleColor: '#e8eaf2', bodyColor: '#9ca3af', padding: 12,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y, METRICS[ctx.dataset.label]?.format || 'number')}` }
        }
      },
      scales: {
        x: { ticks: { color: '#5a6070', font: { size: 11, family: 'JetBrains Mono' } }, grid: { color: '#252836' }, offset: true },
        y1: { display: hasY1, position: 'left', ticks: { color: '#f59e0b', font: { size: 10 }, callback: v => fmtRp(v) }, grid: { color: '#252836' } },
        y2: { display: hasY2, position: hasY1 ? 'right' : 'left', ticks: { color: '#10b981', font: { size: 10 }, callback: v => fmtNum(v) }, grid: { display: !hasY1, color: '#252836' } },
        y3: { display: hasY3, position: 'right', ticks: { color: '#e879f9', font: { size: 10 }, callback: v => fmtPct(v) }, grid: { display: false } },
      }
    }
  });
}

document.querySelectorAll('.toggle[data-metric]').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    if (filteredData.length) renderChart(filteredData);
  });
});

function setGroup(group) {
  currentGroup = group;
  document.querySelectorAll('[data-quick]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[data-group]').forEach(b => b.classList.toggle('active', b.dataset.group === group));
  document.getElementById('period-filter').style.display = 'flex';
  ['day','week','month','custom'].forEach(g => {
    document.getElementById('filter-'+g).style.display = g === group ? 'flex' : 'none';
  });
  const titles = { day:'Tren Harian', week:'Tren Mingguan', month:'Tren Bulanan', custom:'Tren Custom' };
  document.getElementById('chart-title').textContent = titles[group];
  filteredData = [...globalData];
  renderKPI(filteredData); renderChart(filteredData); updateDateRange(filteredData);
}

function quickSelect(val) {
  if (!globalData.length) return;
  const dates = [...new Set(globalData.map(d => d['Tanggal']))].sort();
  const last  = dates[dates.length - 1];
  let from = last;
  if (val === '7days')  { const d = new Date(last); d.setDate(d.getDate()-6);  from = d.toISOString().split('T')[0]; }
  if (val === '30days') { const d = new Date(last); d.setDate(d.getDate()-29); from = d.toISOString().split('T')[0]; }
  document.querySelectorAll('[data-group]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[data-quick]').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-quick="${val}"]`)?.classList.add('active');
  document.getElementById('period-filter').style.display = 'none';
  filteredData = val === 'yesterday'
    ? globalData.filter(d => d['Tanggal'] === last)
    : globalData.filter(d => d['Tanggal'] >= from && d['Tanggal'] <= last);
  if (!filteredData.length) return;
  currentGroup = 'day';
  renderKPI(filteredData); renderChart(filteredData); updateDateRange(filteredData);
}

function applyFilterDay() {
  const date = document.getElementById('date-single').value;
  if (!date) return;
  filteredData = globalData.filter(d => d['Tanggal'] === date);
  if (!filteredData.length) { document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data untuk tanggal ini.</div>'; return; }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData); renderChart(filteredData);
  document.getElementById('date-range').textContent = date + ' · 1 hari';
}

function buildWeekOptions() {
  const select = document.getElementById('week-select'); select.innerHTML = '';
  const weeks = {};
  globalData.forEach(d => {
    const date = new Date(d['Tanggal']), day = date.getDay(), diff = (day===0?-6:1-day);
    const mon = new Date(date); mon.setDate(date.getDate()+diff);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    const key = mon.toISOString().split('T')[0];
    if (!weeks[key]) { const f = d => d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}); weeks[key] = `${f(mon)} – ${f(sun)}`; }
  });
  Object.entries(weeks).sort().forEach(([key,label]) => { const o = document.createElement('option'); o.value=key; o.textContent=label; select.appendChild(o); });
  if (select.options.length) select.selectedIndex = select.options.length-1;
}

function applyFilterWeek() {
  const monday = document.getElementById('week-select').value;
  const sun = new Date(monday); sun.setDate(sun.getDate()+6);
  const sundayStr = sun.toISOString().split('T')[0];
  filteredData = globalData.filter(d => d['Tanggal'] >= monday && d['Tanggal'] <= sundayStr);
  if (!filteredData.length) { document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data.</div>'; return; }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData); renderChart(filteredData); updateDateRange(filteredData);
}

function buildMonthOptions() {
  const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const months = {};
  globalData.forEach(d => {
    const date = new Date(d['Tanggal']);
    const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    if (!months[key]) months[key] = `${BULAN[date.getMonth()]} ${date.getFullYear()}`;
  });
  const entries = Object.entries(months).sort();
  ['month-from','month-to'].forEach(id => {
    const sel = document.getElementById(id); sel.innerHTML = '';
    entries.forEach(([key,label]) => { const o = document.createElement('option'); o.value=key; o.textContent=label; sel.appendChild(o); });
  });
  const f = document.getElementById('month-from'), t = document.getElementById('month-to');
  if (f.options.length) f.selectedIndex = 0;
  if (t.options.length) t.selectedIndex = t.options.length-1;
}

function applyFilterMonth() {
  const from = document.getElementById('month-from').value, to = document.getElementById('month-to').value;
  const fromDate = from+'-01';
  const toObj = new Date(to+'-01'); toObj.setMonth(toObj.getMonth()+1); toObj.setDate(toObj.getDate()-1);
  const toDate = toObj.toISOString().split('T')[0];
  filteredData = globalData.filter(d => d['Tanggal'] >= fromDate && d['Tanggal'] <= toDate);
  if (!filteredData.length) { document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data.</div>'; return; }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData); renderChart(filteredData); updateDateRange(filteredData);
}

function applyFilterCustom() {
  const from = document.getElementById('custom-from').value, to = document.getElementById('custom-to').value;
  if (!from || !to) return;
  filteredData = globalData.filter(d => d['Tanggal'] >= from && d['Tanggal'] <= to);
  if (!filteredData.length) { document.getElementById('error-container').innerHTML = '<div class="error">⚠️ Tidak ada data.</div>'; return; }
  document.getElementById('error-container').innerHTML = '';
  renderKPI(filteredData); renderChart(filteredData); updateDateRange(filteredData);
}

function resetFilter() {
  filteredData = [...globalData];
  renderKPI(filteredData); renderChart(filteredData); updateDateRange(filteredData);
}

function updateDateRange(data) {
  const dates = data.map(d => d['Tanggal']).sort();
  if (!dates.length) {
    document.getElementById('compare-section').style.display = 'none';
    return;
  }
  document.getElementById('date-range').textContent = dates.length === 1
    ? dates[0] + ' · 1 hari'
    : `${dates[0]} — ${dates[dates.length-1]} · ${dates.length} hari`;

  renderCompareSection(dates[0], dates[dates.length-1]);
}

// ── Sidebar Toggle (persists across pages) ────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const content = document.querySelector('.content-area');
  const overlay = document.getElementById('sidebar-overlay');
  const isCollapsed = sidebar.classList.contains('collapsed');
  if (isCollapsed) {
    sidebar.classList.remove('collapsed');
    content.classList.remove('expanded');
    overlay.classList.remove('show');
    localStorage.setItem('sidebar', 'open');
  } else {
    sidebar.classList.add('collapsed');
    content.classList.add('expanded');
    if (window.innerWidth < 900) overlay.classList.add('show');
    localStorage.setItem('sidebar', 'closed');
  }
}

// Restore state dari localStorage
(function() {
  const state = localStorage.getItem('sidebar');
  if (state === 'closed') {
    const sidebar = document.getElementById('sidebar');
    const content = document.querySelector('.content-area');
    if (sidebar) sidebar.classList.add('collapsed');
    if (content) content.classList.add('expanded');
  }
})();

// Init
setPlatform('all');
</script>
